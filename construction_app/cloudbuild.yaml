steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/cabrera-construction-api:$COMMIT_SHA"
      - -t
      - "gcr.io/$PROJECT_ID/cabrera-construction-api:latest"
      - .

  # Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "--all-tags"
      - "gcr.io/$PROJECT_ID/cabrera-construction-api"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - cabrera-construction-api
      - --image=gcr.io/$PROJECT_ID/cabrera-construction-api:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=DATABASE_URL=$$DATABASE_URL
      - --set-env-vars=STRIPE_SECRET_KEY=$$STRIPE_SECRET_KEY
      - --set-env-vars=GOOGLE_CREDENTIALS_FILE=/app/google_credentials.json
      - --set-secrets=DATABASE_URL=cabrera-db-url:latest
      - --set-secrets=STRIPE_SECRET_KEY=stripe-secret-key:latest
      - --add-cloudsql-instances=$PROJECT_ID:us-central1:cabrera-construction-db
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10

images:
  - "gcr.io/$PROJECT_ID/cabrera-construction-api:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/cabrera-construction-api:latest"

options:
  logging: CLOUD_LOGGING_ONLY
